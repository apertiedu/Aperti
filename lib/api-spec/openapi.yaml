openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Aperti Attendance System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: students
  - name: sessions
  - name: attendance
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Add a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "409":
          description: Duplicate student code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students/{id}:
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /students/bulk:
    post:
      operationId: bulkCreateStudents
      tags: [students]
      summary: Bulk add students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateStudentsBody"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all session templates
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a recurring weekly session template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /attendance/mark:
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark a student as present
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "200":
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: sessionId
          in: query
          schema:
            type: integer
        - name: studentCode
          in: query
          schema:
            type: string
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/auto-absence:
    post:
      operationId: autoMarkAbsence
      tags: [attendance]
      summary: Auto-mark absent students for a week
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoAbsenceBody"
      responses:
        "200":
          description: Absences marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoAbsenceResult"

  /attendance/export:
    get:
      operationId: exportAttendance
      tags: [attendance]
      summary: Export attendance as CSV
      parameters:
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent attendance activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/weekly-stats:
    get:
      operationId: getWeeklyStats
      tags: [dashboard]
      summary: Weekly attendance breakdown
      parameters:
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weekly stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    SessionInfo:
      type: object
      properties:
        id:
          type: integer
        lessonNumber:
          type: integer
        dayOfWeek:
          type: string
        startTime:
          type: string
      required: [id, lessonNumber, dayOfWeek, startTime]

    Student:
      type: object
      properties:
        id:
          type: integer
        studentCode:
          type: string
        studentName:
          type: string
        lesson1SessionId:
          type: integer
          nullable: true
        lesson2SessionId:
          type: integer
          nullable: true
        lesson3SessionId:
          type: integer
          nullable: true
        lesson1Session:
          $ref: "#/components/schemas/SessionInfo"
          nullable: true
        lesson2Session:
          $ref: "#/components/schemas/SessionInfo"
          nullable: true
        lesson3Session:
          $ref: "#/components/schemas/SessionInfo"
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentCode
        - studentName
        - createdAt

    CreateStudentBody:
      type: object
      properties:
        studentCode:
          type: string
        studentName:
          type: string
        lesson1SessionId:
          type: integer
          nullable: true
        lesson2SessionId:
          type: integer
          nullable: true
        lesson3SessionId:
          type: integer
          nullable: true
      required:
        - studentCode
        - studentName

    BulkCreateStudentsBody:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/CreateStudentBody"
      required: [students]

    BulkImportResult:
      type: object
      properties:
        added:
          type: integer
        skipped:
          type: integer
        total:
          type: integer
      required: [added, skipped, total]

    Session:
      type: object
      properties:
        id:
          type: integer
        lessonNumber:
          type: integer
          enum: [1, 2, 3]
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        startTime:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, lessonNumber, dayOfWeek, startTime, createdAt]

    CreateSessionBody:
      type: object
      properties:
        lessonNumber:
          type: integer
          enum: [1, 2, 3]
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        startTime:
          type: string
      required: [lessonNumber, dayOfWeek, startTime]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        sessionId:
          type: integer
        studentCode:
          type: string
        studentName:
          type: string
        lessonNumber:
          type: integer
        dayOfWeek:
          type: string
        startTime:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [Present, Absent]
        markedAt:
          type: string
          format: date-time
      required: [id, studentId, sessionId, studentCode, studentName, lessonNumber, dayOfWeek, startTime, date, status, markedAt]

    MarkAttendanceBody:
      type: object
      properties:
        studentCode:
          type: string
        sessionId:
          type: integer
      required: [studentCode, sessionId]

    AutoAbsenceBody:
      type: object
      properties:
        weekStart:
          type: string
          format: date
      required: [weekStart]

    AutoAbsenceResult:
      type: object
      properties:
        marked:
          type: integer
        message:
          type: string
      required: [marked, message]

    DashboardSummary:
      type: object
      properties:
        totalStudents:
          type: integer
        totalSessions:
          type: integer
        attendanceRate:
          type: number
          format: float
        absentStudents:
          type: integer
        presentToday:
          type: integer
      required: [totalStudents, totalSessions, attendanceRate, absentStudents, presentToday]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        studentCode:
          type: string
        studentName:
          type: string
        lessonNumber:
          type: integer
        status:
          type: string
        markedAt:
          type: string
          format: date-time
      required: [id, studentCode, studentName, lessonNumber, status, markedAt]

    WeeklyStats:
      type: object
      properties:
        totalPresent:
          type: integer
        totalAbsent:
          type: integer
        byLesson:
          type: array
          items:
            type: object
            properties:
              lessonNumber:
                type: integer
              present:
                type: integer
              absent:
                type: integer
            required: [lessonNumber, present, absent]
      required: [totalPresent, totalAbsent, byLesson]
