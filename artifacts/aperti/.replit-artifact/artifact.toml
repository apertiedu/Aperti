kind = "web"
previewPath = "/"
title = "Aperti Attendance System"
version = "1.0.0"
id = "artifacts/aperti"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21664

[services.development]
run = "pnpm --filter @workspace/aperti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aperti", "run", "build" ]
publicDir = "artifacts/aperti/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21664"
BASE_PATH = "/"
